services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env.docker
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.docker
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    command: php artisan queue:work --tries=3 --max-time=3600
    restart: unless-stopped

  queue-webhooks:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env.docker
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    command: php artisan queue:work --queue=webhooks --tries=3 --max-time=3600
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${DB_DATABASE:-daftrics}"
      POSTGRES_USER: "${DB_USERNAME:-daftrics}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-daftrics} -d ${DB_DATABASE:-daftrics}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  app-storage:
